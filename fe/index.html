<!doctype html>
<html>
    <head>
        <title>Live Vote Platform</title>
    </head>
    <body>
        <button onclick="createRoom()">Create Room</button>
        <button onclick="createSubject()">Create Subject</button>
        <button onclick="createSubToken()">Create Sub Token</button>

        <script>
            function createSubject() {
                const name = prompt("Enter subject name:");
                const connection_key = prompt("Enter connection key:");

                if (!name || !connection_key) return;
                fetch("http://localhost:4200/create-subjects", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        name: name,
                        token: connection_key,
                    }),
                })
                    .then((response) => response.json())
                    .then((data) => {
                        console.log(data);
                    })
                    .catch((error) => {
                        console.error("Error:", error);
                    });
            }

            function createRoom() {
                const name = prompt("Enter room name:");
                const voteType = prompt("Enter voting type:");

                if (!name || !voteType) return;

                const roomExpiresAt = new Date(
                    new Date().getTime() + 24 * 60 * 60 * 1000,
                ).toISOString();

                fetch("http://localhost:4200/create-room", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ name, voteType, roomExpiresAt }),
                })
                    .then((response) => response.json())
                    .then((data) => {
                        console.log(data);
                        localStorage.setItem("roomName", JSON.stringify(data));
                    })
                    .catch((error) => {
                        console.error("Error:", error);
                    });
            }

            function createSubToken() {
                const role = prompt("Enter sub token role:");
                const name = prompt("Enter sub token name:");

                if (!role) return;
                if (!name) return;
                const room = JSON.parse(localStorage.getItem("roomName"));

                const expires_at = new Date(
                    new Date().getTime() + 12 * 60 * 60 * 1000,
                ).toISOString();
                console.log(room);

                console.log({
                    room_id: room.info.room_id,
                    role,
                    expires_at,
                    name,
                });
                fetch("http://localhost:4200/admin/create-sub-token", {
                    method: "POST",
                    headers: {
                        Authorization: "Bearer " + room.connection_key,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        roomId: room.info.room_id,
                        role,
                        expiresAt: expires_at,
                        name,
                    }),
                })
                    .then((response) => response.json())
                    .then((data) => {
                        console.log(data);
                    })
                    .catch((error) => {
                        console.error("Error:", error);
                    });
            }
        </script>
    </body>
</html>
